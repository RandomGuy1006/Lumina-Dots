# modules/yazi/yazi.toml
# Yazi file manager configuration

[manager]
ratio          = [1, 2, 4]     # Left:mid:preview column ratio
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true
linemode       = "none"
scrolloff      = 5

[preview]
tab_size    = 2
max_width   = 600
max_height  = 900
cache_dir   = ""
image_filter  = "triangle"
image_quality = 75
sixel_ratio   = 4
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = "nvim '$@'", desc = "Edit with Neovim", block = true },
]
open = [
  { run = "xdg-open '$@'", desc = "Open", orphan = true },
]
reveal = [
  { run = "nautilus '$@'", desc = "Reveal in Nautilus", orphan = true },
]
media = [
  { run = "mpv '$@'", desc = "Play with mpv", orphan = true },
]
image = [
  { run = "loupe '$@'", desc = "Open in Loupe", orphan = true },
]
archive = [
  { run = "file-roller '$@'", desc = "Open Archive Manager", orphan = true },
]

[open]
rules = [
  { name = "*/", use = "edit" },
  { mime = "text/*",         use = "edit" },
  { mime = "image/*",        use = "image" },
  { mime = "video/*",        use = "media" },
  { mime = "audio/*",        use = "media" },
  { mime = "application/zip", use = "archive" },
  { mime = "application/x-tar", use = "archive" },
  { mime = "inode/x-empty",  use = "edit" },
  { mime = "*",              use = "open" },
]

[tasks]
micro_workers    = 10
macro_workers    = 5
bizarre_retry    = 5
image_alloc      = 536870912   # 512MB
image_bound      = [0, 0]
suppress_preload = false

[plugin]
fetchers = [
  { id = "mime", name = "*", run = "mime" },
]
preloaders = [
  { name = "*/", cond = "mime", run = "folder", multi = true },
  { mime = "image/*",  cond = "mime", run = "image", multi = true },
  { mime = "video/*",  cond = "mime", run = "video", multi = true },
  { mime = "application/pdf", cond = "mime", run = "pdf", multi = true },
]
previewers = [
  { name = "*/", run = "folder" },
  { mime = "text/*",   run = "code" },
  { mime = "image/*",  run = "image" },
  { mime = "video/*",  run = "video" },
  { mime = "audio/*",  run = "audio" },
  { mime = "application/pdf", run = "pdf" },
  { mime = "*",        run = "file" },
]

[input]
cursor_blink = false

[select]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[which]
sort_by         = "none"
sort_sensitive  = false
sort_reverse    = false
sort_translit   = false

[log]
enabled = false
