# modules/yazi/keymap.toml
# Yazi keyboard shortcuts

[manager]
keymap = [
  { on = "q",          run = "quit",                   desc = "Quit" },
  { on = "<Esc>",      run = "escape",                 desc = "Escape" },
  { on = "k",          run = "arrow -1",               desc = "Up" },
  { on = "j",          run = "arrow 1",                desc = "Down" },
  { on = "h",          run = "leave",                  desc = "Parent dir" },
  { on = "l",          run = "enter",                  desc = "Enter / open" },
  { on = "<Enter>",    run = "open",                   desc = "Open" },
  { on = "<Up>",       run = "arrow -1",               desc = "Up" },
  { on = "<Down>",     run = "arrow 1",                desc = "Down" },
  { on = "<Left>",     run = "leave",                  desc = "Parent dir" },
  { on = "<Right>",    run = "enter",                  desc = "Enter" },
  { on = "K",          run = "arrow -5",               desc = "Up 5" },
  { on = "J",          run = "arrow 5",                desc = "Down 5" },
  { on = "g",          run = "arrow -99999999",        desc = "Top" },
  { on = "G",          run = "arrow 99999999",         desc = "Bottom" },
  { on = "<Space>",    run = "select --state=none",    desc = "Toggle select" },
  { on = "y",          run = "yank",                   desc = "Yank (copy)" },
  { on = "x",          run = "yank --cut",             desc = "Yank (cut)" },
  { on = "p",          run = "paste",                  desc = "Paste" },
  { on = "P",          run = "paste --force",          desc = "Paste (overwrite)" },
  { on = "d",          run = "remove",                 desc = "Move to trash" },
  { on = "D",          run = "remove --permanently",   desc = "Delete permanently" },
  { on = "a",          run = "create",                 desc = "Create file/dir" },
  { on = "r",          run = "rename",                 desc = "Rename" },
  { on = ".",          run = "hidden toggle",          desc = "Toggle hidden files" },
  { on = "/",          run = "find",                   desc = "Find" },
  { on = "n",          run = "find_arrow",             desc = "Next find result" },
  { on = "N",          run = "find_arrow --previous",  desc = "Prev find result" },
  { on = "s",          run = "sort name --reverse=no", desc = "Sort by name" },
  { on = "S",          run = "sort mtime --reverse",   desc = "Sort by modified" },
  { on = "z",          run = "jump zoxide",            desc = "Jump via zoxide" },
  { on = "<Tab>",      run = "plugin --sync smart-enter", desc = "Smart enter" },
  { on = "t",          run = "tab_create --current",   desc = "New tab" },
  { on = "1",          run = "tab_switch 0",           desc = "Tab 1" },
  { on = "2",          run = "tab_switch 1",           desc = "Tab 2" },
  { on = "3",          run = "tab_switch 2",           desc = "Tab 3" },
  { on = "[",          run = "tab_switch -1 --relative", desc = "Prev tab" },
  { on = "]",          run = "tab_switch 1 --relative",  desc = "Next tab" },
]

[input]
keymap = [
  { on = "<Esc>",   run = "close",          desc = "Cancel" },
  { on = "<Enter>", run = "submit",         desc = "Submit" },
  { on = "<C-c>",   run = "close",          desc = "Cancel" },
  { on = "<Left>",  run = "move -1",        desc = "Move left" },
  { on = "<Right>", run = "move 1",         desc = "Move right" },
  { on = "<C-a>",   run = "move -999",      desc = "Start of line" },
  { on = "<C-e>",   run = "move 999",       desc = "End of line" },
  { on = "<Backspace>", run = "backspace",  desc = "Delete char" },
  { on = "<C-w>",   run = "backspace --word", desc = "Delete word" },
]

[select]
keymap = [
  { on = "<Esc>",   run = "close",          desc = "Cancel" },
  { on = "<Enter>", run = "submit",         desc = "Submit" },
  { on = "k",       run = "arrow -1",       desc = "Up" },
  { on = "j",       run = "arrow 1",        desc = "Down" },
]
