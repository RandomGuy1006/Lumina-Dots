# modules/mpv/mpv.conf
# mpv media player configuration

# ─── Video ────────────────────────────────────────────────────────────────────
vo=gpu-next
gpu-api=vulkan
hwdec=nvdec-copy           # NVIDIA hardware decode (use vaapi-copy for Intel iGPU)
hwdec-codecs=all
profile=gpu-hq
scale=ewa_lanczos
cscale=ewa_lanczos
dscale=mitchell
video-sync=display-resample
interpolation=yes
tscale=oversample

# ─── Audio ────────────────────────────────────────────────────────────────────
ao=pipewire
audio-channels=stereo
audio-normalize-downmix=yes
volume=80
volume-max=150

# ─── Subtitles ────────────────────────────────────────────────────────────────
sub-auto=fuzzy
sub-font="Inter"
sub-font-size=44
sub-color="#FFFFFF"
sub-border-color="#000000"
sub-border-size=2
sub-shadow-offset=1

# ─── OSD ──────────────────────────────────────────────────────────────────────
osd-font="Inter"
osd-font-size=32
osd-color="#FFFFFF"
osd-border-color="#000000"
osd-bar=yes

# ─── Behavior ─────────────────────────────────────────────────────────────────
save-position-on-quit=yes
loop-playlist=inf
force-window=yes
keep-open=yes

# ─── Screenshot ───────────────────────────────────────────────────────────────
screenshot-format=png
screenshot-directory=~/Pictures/Screenshots/mpv
screenshot-template=mpv-%P-%n
