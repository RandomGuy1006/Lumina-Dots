# modules/hypr/layouts.conf
# Tiling layout settings

dwindle {
  preserve_split       = true
  force_split          = 2          # Always split to the right/bottom
  smart_split          = false
  smart_resizing       = true
  special_scale_factor = 0.8
  split_width_multiplier = 1.0
  use_active_for_splits = true
}

master {
  new_status        = master
  new_on_top        = false
  mfact             = 0.55
  special_scale_factor = 0.8
  allow_small_split = false
  smart_resizing    = true
}
