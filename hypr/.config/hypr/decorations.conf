# modules/hypr/decorations.conf
# Window decorations: shadows, rounding
# Colors come from colors.conf (Matugen-generated)

general {
  gaps_in  = $gap_inner
  gaps_out = $gap_outer
  border_size = 2

  # Colors from Matugen theme (defined in colors.conf)
  col.active_border   = $accent $accent_alt 45deg
  col.inactive_border = $border_inactive

  resize_on_border      = true
  allow_tearing         = false
  layout                = dwindle
}

decoration {
  rounding = $radius_shell
  rounding_power = 2

  # ─── Shadow ──────────────────────────────────────────────────────────────
  shadow {
    enabled      = true
    range        = $shadow_range
    render_power = $shadow_render_power
    color        = rgba(0, 0, 0, 0.4)
    color_inactive = rgba(0, 0, 0, 0.2)
    offset       = 0 5
  }
}

misc {
  disable_hyprland_logo    = true
  disable_splash_rendering = true
  force_default_wallpaper  = 0
  mouse_move_enables_dpms  = true
  key_press_enables_dpms   = true
  animate_manual_resizes   = true
  animate_mouse_windowdragging = true
  enable_swallow           = true
  swallow_regex            = ^(ghostty|kitty|foot)$
  focus_on_activate        = false
  background_color         = $surface
}
