# modules/hypr/rules.conf
# Window rules — floating, sizing, and workspace assignments

# ─── Floating windows ─────────────────────────────────────────────────────────
windowrule = match:class ^(Waypaper)$, float on
windowrule = match:class ^(waypaper)$, float on
windowrule = match:class ^(Blueman-manager)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(EasyEffects)$, float on

windowrule = match:class ^(satty)$, float on
windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(qt5ct)$, float on
windowrule = match:class ^(qt6ct)$, float on
windowrule = match:class ^(kvantum)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Open File)$, float on
windowrule = match:title ^(Save File)$, float on
windowrule = match:title ^(Confirm)(.*)$, float on
windowrule = match:title ^(File Upload)(.*)$, float on

# ─── Floating sizes ───────────────────────────────────────────────────────────
windowrule = match:class ^(Blueman-manager)$, size 900 600
windowrule = match:class ^(nm-connection-editor)$, size 900 600
windowrule = match:class ^(pavucontrol)$, size 1000 700
windowrule = match:class ^(EasyEffects)$, size 1200 750
windowrule = match:class ^(Blueman-manager)$, center on
windowrule = match:class ^(nm-connection-editor)$, center on
windowrule = match:class ^(pavucontrol)$, center on
windowrule = match:class ^(EasyEffects)$, center on
windowrule = match:title ^(Keybinds)$, float on
windowrule = match:title ^(Keybinds)$, size 900 700
windowrule = match:title ^(Keybinds)$, center on

# ─── Special behaviors ────────────────────────────────────────────────────────

# Satty — always on top when open
windowrule = match:class ^(satty)$, stay_focused on

# PiP
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, keep_aspect_ratio on

# ─── Workspace assignments ────────────────────────────────────────────────────
windowrule = match:class ^(firefox)$, workspace 2
windowrule = match:class ^(chromium)$, workspace 2
windowrule = match:class ^(org.gnome.Nautilus)$, workspace 3
windowrule = match:class ^(EasyEffects)$, workspace 9
windowrule = match:class ^(Blueman-manager)$, workspace 10

# ─── XWayland games (if any) ─────────────────────────────────────────────────
windowrule = match:class ^(steam_app_.*)$, immediate on
windowrule = match:class ^(steam_app_.*)$, tile on

# ─── Blur suppression (for non-transparent windows) ───────────────────────────
windowrule = match:class ^(mpv)$, no_blur on
windowrule = match:title ^(Picture-in-Picture)$, no_blur on

# ─── No rounding for fullscreen ───────────────────────────────────────────────
windowrule = match:fullscreen true, rounding 0
