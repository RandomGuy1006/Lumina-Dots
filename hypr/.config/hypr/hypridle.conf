# modules/hypr/hypridle.conf
# Idle management — screen dim → lock → suspend
# Tuned for LOQ 15IRX9 (NVIDIA: avoid suspend with GPU active)

general {
  lock_cmd        = pidof hyprlock || hyprlock    # Don't double-lock
  before_sleep_cmd = bash -c 'mkdir -p ~/.local/state/lumina; date --iso-8601=seconds >> ~/.local/state/lumina/sleep.log; loginctl lock-session' # Lock before sleep
  after_sleep_cmd  = bash -c 'hyprctl dispatch dpms on; lumina-toast "Resume complete" "Sleep log: ~/.local/state/lumina/sleep.log" info 2>/dev/null || true' # Wake display on resume
  ignore_dbus_inhibit = false
  ignore_systemd_inhibit = false
}

# ─── 2.5 min: dim screen ─────────────────────────────────────────────────────
listener {
  timeout  = 150
  on-timeout = bash -c 'brightnessctl -m g | cut -d, -f4 > ${XDG_RUNTIME_DIR}/lumina-brightness && brightnessctl s 10%'
  on-resume  = bash -c 'brightnessctl s "$(cat ${XDG_RUNTIME_DIR}/lumina-brightness)"'
}

# ─── 5 min: lock screen ──────────────────────────────────────────────────────
listener {
  timeout  = 300
  on-timeout = loginctl lock-session
  on-resume  = hyprctl dispatch dpms on
}

# ─── 5.5 min: turn off displays ──────────────────────────────────────────────
listener {
  timeout  = 330
  on-timeout = hyprctl dispatch dpms off
  on-resume  = hyprctl dispatch dpms on
}

# ─── 15 min: suspend (only on battery) ───────────────────────────────────────
# Uses UPower to check battery state before suspending
listener {
  timeout  = 900
  on-timeout = bash -c '
    if upower -i $(upower -e | grep battery) | grep -q "state:.*discharging"; then
      systemctl suspend
    fi
  '
}
