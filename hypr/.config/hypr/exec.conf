# modules/hypr/exec.conf
# All exec-once and exec directives live here.
# Order is critical — see comments.

# ─── 1. Import Wayland/display env vars into systemd user session ─────────────
# Must run before uwsm finalize so portals and services see the correct env.
exec-once = bash -lc 'source "${HOME}/.config/lumina/env.sh" 2>/dev/null || true; systemctl --user import-environment WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE HYPRLAND_INSTANCE_SIGNATURE DOTFILES_DIR LOQDOTS_ROOT'

# Generate Glass Engine compositor state after env/PATH import and before wallpaper restore.
exec-once = bash -lc 'source "${HOME}/.config/lumina/env.sh" 2>/dev/null || true; "${HOME}/.local/bin/lumina-glass" reload'

# ─── 2. Finalize UWSM activation (unblocks loq-session.target) ───────────────
exec-once = uwsm finalize

# ─── 3. Start systemd session target (swww, cliphist, hypridle, hyprpanel…) ──
exec-once = systemctl --user start loq-session.target

# Pre-render Mission Control; Control Center and Keybind Overlay are owned by user services.
exec-once = uwsm app -- lumina-mission-control --daemon

# ─── 4. Lock on first login (waits for swww to be ready before locking) ──────
# The service itself polls `swww query` before exec'ing hyprlock.
exec-once = systemctl --user start loq-hyprlock-boot.service

# ─── 5. Polkit agent ─────────────────────────────────────────────────────────
exec-once = bash ~/.config/hypr/scripts/polkit.sh

# ─── 6. Battery low alert daemon ─────────────────────────────────────────────
exec-once = bash ~/.config/hypr/scripts/battery-alert.sh

# ─── 7. Per-host polish and monitor layout ───────────────────────────────────
exec-once = bash ~/.config/hypr/scripts/setup-avatar.sh
exec = bash ~/.config/hypr/scripts/monitor-detect.sh

# ─── 8. Restore last wallpaper through the canonical Lumina cascade ──────────
exec-once = bash -c '
  source "${HOME}/.config/lumina/env.sh" 2>/dev/null || true
  WALLPAPER_FILE="${HOME}/Pictures/Wallpapers/.current"
  FALLBACK="${HOME}/Pictures/Wallpapers/lumina-default.jpg"
  if [[ -f "${WALLPAPER_FILE}" ]]; then
    TARGET="$(cat "${WALLPAPER_FILE}")"
  else
    TARGET="${FALLBACK}"
  fi
  if [[ -f "${TARGET}" ]]; then
    lumina-wallpaper "${TARGET}" --transition-type none --transition-duration 0 >/dev/null 2>&1 || true
  fi
'

# ─── 9. Night light (transitions colour temp at sunset) ──────────────────────
exec-once = hyprsunset -t 4500

# ─── 10. Audio role corking for notification/media behavior ──────────────────
exec-once = pactl load-module module-role-cork

# ─── Per-login (runs every Hyprland start, not just once) ────────────────────
# Sync cursor — required after wake-from-suspend
exec = hyprctl setcursor Bibata-Modern-Ice 24

# Lumina session health check (polls for session units inside the script)
exec-once = bash ~/.config/hypr/scripts/session-health.sh
