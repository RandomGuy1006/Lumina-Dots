# modules/hypr/binds.conf
# Complete keybinding reference for lumina-dots
# See docs/keybindings.md for full documentation

$mod = SUPER
$terminal = ghostty
$fileManager = nautilus
$launcher = walker
$browser = firefox

# category: Apps
# ─── Applications ─────────────────────────────────────────────────────────────
bind = $mod,       Return,      exec, $terminal  # desc: $terminal
bind = $mod,       E,           exec, $fileManager  # desc: $fileManager
bind = $mod,       B,           exec, $browser  # desc: $browser
bind = $mod,       Space,       exec, $launcher  # desc: $launcher
bind = $mod,       C,           exec, uwsm app -- lumina-control-center  # desc: uwsm app -- lumina-control-center
bind = $mod,       D,           exec, uwsm app -- lumina-doctor-dashboard  # desc: uwsm app -- lumina-doctor-dashboard
bind = $mod,       A,           exec, uwsm app -- lumina-ai  # desc: uwsm app -- lumina-ai
bind = $mod,       L,           exec, uwsm app -- lumina-hub  # desc: uwsm app -- lumina-hub
bind = $mod SHIFT, B,           exec, uwsm app -- lumina-snapshot-manager  # desc: uwsm app -- lumina-snapshot-manager

# category: Help
bind = $mod,       slash,       exec, uwsm app -- lumina-keybind-overlay  # desc: Open Keybind Overlay

# category: Apps
# Yazi (terminal file manager) removed
# bind = $mod SHIFT, E,           exec, $terminal -e yazi
# Btop (system monitor)
bind = $mod,       M,           exec, $terminal -e btop  # desc: $terminal -e btop
# Neovim
bind = $mod SHIFT, N,           exec, $terminal -e nvim  # desc: $terminal -e nvim
bind = $mod,       N,           exec, bash ~/.config/hypr/scripts/scratch-notes.sh  # desc: bash ~/.config/hypr/scripts/scratch-notes.sh
# Clipboard history
bind = $mod,       V,           exec, bash -c "cliphist list | walker --stdin | cliphist decode | wl-copy"  # desc: bash -c "cliphist list | walker --stdin | cliphist decode | wl-copy"

# category: Productivity
# ─── Screenshot ───────────────────────────────────────────────────────────────
# Region capture + annotate with Satty
bind = ,          Print,        exec, bash -c "grimblast save area - | satty --filename -"  # desc: bash -c "grimblast save area - | satty --filename -"
# Full screen capture
bind = SHIFT,     Print,        exec, grimblast copy screen  # desc: grimblast copy screen
# Active window capture
bind = $mod,      Print,        exec, grimblast copy active  # desc: grimblast copy active
# Save to file
bind = $mod CTRL, Print,        exec, bash -c 'grimblast --notify save area ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png'  # desc: bash -c 'grimblast --notify save area ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png'
# OCR selected region to clipboard
bind = $mod SHIFT, O,           exec, bash ~/.config/hypr/scripts/ocr-region.sh  # desc: bash ~/.config/hypr/scripts/ocr-region.sh

# ─── Hyprland control ─────────────────────────────────────────────────────────
# Close active window
bind = $mod,       Q,           killactive  # desc: Lumina action
# Force close
bind = $mod SHIFT, Q,           exec, hyprctl kill  # desc: hyprctl kill
# Toggle float
bind = $mod,       T,           togglefloating  # desc: Lumina action
# Toggle fullscreen
bind = $mod,       F,           fullscreen  # desc: Lumina action
# Toggle maximize (fullscreen without bar)
bind = $mod CTRL,  F,           fullscreen, 1  # desc: 1
bind = $mod SHIFT, F,           exec, bash ~/.config/hypr/scripts/focus-mode.sh  # desc: bash ~/.config/hypr/scripts/focus-mode.sh
# Toggle pseudo tile
bind = $mod,       P,           pseudo  # desc: Lumina action
# Toggle split direction
bind = $mod,       S,           togglesplit  # desc: Lumina action
# Pin floating window
bind = $mod ALT,   I,           pin  # desc: Lumina action

# Reload config
bind = $mod SHIFT, R,           exec, bash -c "hyprctl reload && pkill -x hyprpanel 2>/dev/null; for i in \$(seq 1 30); do pgrep -x hyprpanel >/dev/null || break; sleep 0.1; done; hyprpanel &>/dev/null & disown"  # desc: bash -c "hyprctl reload && pkill -x hyprpanel 2>/dev/null; for i in \$(seq 1 30); do pgrep -x hyprpanel >/dev/null || break; sleep 0.1; done; hyprpanel &>/dev/null & disown"

# category: Windows
# ─── Focus movement ───────────────────────────────────────────────────────────
bind = $mod,       left,        movefocus, l  # desc: l
bind = $mod,       right,       movefocus, r  # desc: r
bind = $mod,       up,          movefocus, u  # desc: u
bind = $mod,       down,        movefocus, d  # desc: d
bind = $mod,       H,           movefocus, l  # desc: l
bind = $mod ALT,   L,           movefocus, r  # desc: r
bind = $mod,       K,           movefocus, u  # desc: u
bind = $mod,       J,           movefocus, d  # desc: d

# category: Windows
# ─── Window movement ──────────────────────────────────────────────────────────
bind = $mod SHIFT, left,        movewindow, l  # desc: l
bind = $mod SHIFT, right,       movewindow, r  # desc: r
bind = $mod SHIFT, up,          movewindow, u  # desc: u
bind = $mod SHIFT, down,        movewindow, d  # desc: d
bind = $mod SHIFT, H,           movewindow, l  # desc: l
bind = $mod SHIFT, L,           movewindow, r  # desc: r
bind = $mod SHIFT, K,           movewindow, u  # desc: u
bind = $mod SHIFT, J,           movewindow, d  # desc: d

# category: Windows
# ─── Resize ───────────────────────────────────────────────────────────────────
binde = $mod CTRL, left,        resizeactive, -50 0  # desc: -50 0
binde = $mod CTRL, right,       resizeactive, 50 0  # desc: 50 0
binde = $mod CTRL, up,          resizeactive, 0 -50  # desc: 0 -50
binde = $mod CTRL, down,        resizeactive, 0 50  # desc: 0 50
binde = $mod CTRL, H,           resizeactive, -50 0  # desc: -50 0
binde = $mod CTRL, L,           resizeactive, 50 0  # desc: 50 0
binde = $mod CTRL, K,           resizeactive, 0 -50  # desc: 0 -50
binde = $mod CTRL, J,           resizeactive, 0 50  # desc: 0 50

# category: Navigation
# ─── Workspace switching ──────────────────────────────────────────────────────
bind = $mod,       1,           workspace, 1  # desc: 1
bind = $mod,       2,           workspace, 2  # desc: 2
bind = $mod,       3,           workspace, 3  # desc: 3
bind = $mod,       4,           workspace, 4  # desc: 4
bind = $mod,       5,           workspace, 5  # desc: 5
bind = $mod,       6,           workspace, 6  # desc: 6
bind = $mod,       7,           workspace, 7  # desc: 7
bind = $mod,       8,           workspace, 8  # desc: 8
bind = $mod,       9,           workspace, 9  # desc: 9
bind = $mod,       0,           workspace, 10  # desc: 10

# category: Navigation
# Move window to workspace
bind = $mod SHIFT, 1,           movetoworkspace, 1  # desc: 1
bind = $mod SHIFT, 2,           movetoworkspace, 2  # desc: 2
bind = $mod SHIFT, 3,           movetoworkspace, 3  # desc: 3
bind = $mod SHIFT, 4,           movetoworkspace, 4  # desc: 4
bind = $mod SHIFT, 5,           movetoworkspace, 5  # desc: 5
bind = $mod SHIFT, 6,           movetoworkspace, 6  # desc: 6
bind = $mod SHIFT, 7,           movetoworkspace, 7  # desc: 7
bind = $mod SHIFT, 8,           movetoworkspace, 8  # desc: 8
bind = $mod SHIFT, 9,           movetoworkspace, 9  # desc: 9
bind = $mod SHIFT, 0,           movetoworkspace, 10  # desc: 10

# category: Navigation
# Scroll through workspaces
bind = $mod,       mouse_down,  workspace, e+1  # desc: e+1
bind = $mod,       mouse_up,    workspace, e-1  # desc: e-1
bind = $mod,       bracketright, workspace, e+1  # desc: e+1
bind = $mod,       bracketleft,  workspace, e-1  # desc: e-1
bind = $mod,       Tab,         exec, uwsm app -- lumina-mission-control  # desc: uwsm app -- lumina-mission-control
bind = $mod SHIFT, T,           exec, uwsm app -- lumina-pomodoro  # desc: uwsm app -- lumina-pomodoro

# category: Navigation
# Previous workspace
bind = $mod CTRL,  grave,       workspace, previous  # desc: previous
bind = $mod,       grave,       exec, bash ~/.config/hypr/scripts/scratchpad-terminal.sh  # desc: bash ~/.config/hypr/scripts/scratchpad-terminal.sh

# category: Navigation
# ─── Special workspaces (scratchpads) ─────────────────────────────────────────
bind = $mod ALT,   T,           togglespecialworkspace, terminal  # desc: terminal
bind = $mod ALT,   M,           togglespecialworkspace, btop  # desc: btop
bind = $mod ALT,   N,           togglespecialworkspace, notes  # desc: notes

# category: Windows
# ─── Window switcher (Hyprswitch) ─────────────────────────────────────────────
# Alt+Tab style switcher
bind = ALT,        Tab,         exec, hyprswitch gui --mod-key alt --key Tab --close mod-key-release  # desc: hyprswitch gui --mod-key alt --key Tab --close mod-key-release
bind = ALT SHIFT,  Tab,         exec, hyprswitch gui --mod-key alt_shift --key Tab --close mod-key-release --reverse  # desc: hyprswitch gui --mod-key alt_shift --key Tab --close mod-key-release --reverse

# category: Windows
# ─── Mouse binds ──────────────────────────────────────────────────────────────
bindm = $mod,      mouse:272,   movewindow  # desc: Lumina action
bindm = $mod,      mouse:273,   resizewindow  # desc: Lumina action

# category: Productivity
# ─── Media controls ───────────────────────────────────────────────────────────
bindl = ,  XF86AudioPlay,       exec, playerctl play-pause  # desc: playerctl play-pause
bindl = ,  XF86AudioStop,       exec, playerctl stop  # desc: playerctl stop
bindl = ,  XF86AudioPrev,       exec, playerctl previous  # desc: playerctl previous
bindl = ,  XF86AudioNext,       exec, playerctl next  # desc: playerctl next
bind = $mod SHIFT, M,           exec, bash ~/.config/hypr/scripts/media-overlay.sh  # desc: bash ~/.config/hypr/scripts/media-overlay.sh

# category: System
# ─── Volume ───────────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, lumina-control-center audio up  # desc: lumina-control-center audio up
bindel = , XF86AudioLowerVolume, exec, lumina-control-center audio down  # desc: lumina-control-center audio down
bindl  = , XF86AudioMute,        exec, lumina-control-center audio mute  # desc: lumina-control-center audio mute
bindl  = , XF86AudioMicMute,     exec, lumina-control-center audio mic-mute  # desc: lumina-control-center audio mic-mute

# category: System
# ─── Brightness ───────────────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, lumina-control-center brightness up  # desc: lumina-control-center brightness up
bindel = , XF86MonBrightnessDown, exec, lumina-control-center brightness down  # desc: lumina-control-center brightness down

# category: System
# ─── Power / session ─────────────────────────────────────────────────────────
bind = $mod SHIFT, Escape,      exec, wlogout --protocol layer-shell  # desc: wlogout --protocol layer-shell
bind = $mod SHIFT, P,           exec, bash ~/.config/hypr/scripts/presentation-mode.sh  # desc: bash ~/.config/hypr/scripts/presentation-mode.sh
# Lock screen
bind = $mod,       Escape,      exec, hyprlock  # desc: hyprlock
# Sleep
bind = $mod SHIFT, S,           exec, uwsm app -- lumina-control-center  # desc: Open Control Center
# Gaming mode
bind = $mod,       G,           exec, bash ~/.config/hypr/scripts/gaming-mode.sh  # desc: bash ~/.config/hypr/scripts/gaming-mode.sh
bind = $mod,       I,           exec, bash ~/.config/hypr/scripts/idle-inhibit.sh  # desc: bash ~/.config/hypr/scripts/idle-inhibit.sh

# category: System
# ─── Theme ────────────────────────────────────────────────────────────────────
# Open wallpaper picker
bind = $mod ALT,   W,           exec, waypaper  # desc: waypaper
bind = $mod SHIFT, W,           exec, bash ~/.config/hypr/scripts/random-wallpaper.sh  # desc: bash ~/.config/hypr/scripts/random-wallpaper.sh
# category: System
# Apply theme from clipboard (image path)
bind = $mod CTRL,  W,           exec, bash ~/.config/hypr/scripts/apply-theme-clipboard.sh  # desc: bash ~/.config/hypr/scripts/apply-theme-clipboard.sh

# category: Productivity
# ─── Color picker ─────────────────────────────────────────────────────────────
bind = $mod SHIFT, C,           exec, bash ~/.config/hypr/scripts/color-picker.sh  # desc: bash ~/.config/hypr/scripts/color-picker.sh

# category: Windows
# ─── Submap: resize mode ─────────────────────────────────────────────────────
bind = $mod,       R,           submap, resize  # desc: resize
submap = resize
binde = , right,                resizeactive, 10 0  # desc: 10 0
binde = , left,                 resizeactive, -10 0  # desc: -10 0
binde = , up,                   resizeactive, 0 -10  # desc: 0 -10
binde = , down,                 resizeactive, 0 10  # desc: 0 10
binde = , L,                    resizeactive, 10 0  # desc: 10 0
binde = , H,                    resizeactive, -10 0  # desc: -10 0
binde = , K,                    resizeactive, 0 -10  # desc: 0 -10
binde = , J,                    resizeactive, 0 10  # desc: 0 10
bind  = , escape,               submap, reset  # desc: reset
bind  = , Return,               submap, reset  # desc: reset
bind  = , R,                    submap, reset  # desc: reset
submap = reset
# category: System
bind = $mod, comma, exec, uwsm app -- lumina-settings-studio  # desc: Open Lumina Settings
bind = $mod CTRL, G, exec, uwsm app -- lumina-settings-studio --page=appearance --section=glass-mode  # desc: Open Glass Mode settings
