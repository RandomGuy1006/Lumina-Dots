# modules/hypr/hyprland.conf
# lumina-merged — Main Hyprland configuration
# Source order matters: colors.conf must load first so variables are available
# to decorations.conf. exec.conf contains all startup commands.

# ─── 1. Theme colors (MUST be first — all other configs reference these vars) ──
source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/tokens.conf
source = ~/.config/hypr/conf.d/tokens-colors.conf

# ─── 2. Environment variables ─────────────────────────────────────────────────
source = ~/.config/hypr/env.conf

# ─── 3. Hardware / display ────────────────────────────────────────────────────
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf

# ─── 4. Appearance (references $accent, $surface etc. from colors.conf) ───────
source = ~/.config/hypr/decorations.conf
source = ~/.config/hypr/animations.conf

# ─── 5. Layout & workspaces ───────────────────────────────────────────────────
source = ~/.config/hypr/layouts.conf
source = ~/.config/hypr/workspaces.conf

# ─── 6. Behaviour ─────────────────────────────────────────────────────────────
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/conf.d/glass-rules.conf
source = ~/.config/hypr/conf.d/plugins.conf
source = ~/.config/hypr/binds.conf

# ─── 7. Startup (exec-once lives here, NOT in hyprland.conf) ──────────────────
source = ~/.config/hypr/exec.conf

# ─── 8. User custom overrides (not tracked by git) ───────────────────────────
# Place personal tweaks in ~/.config/hypr/custom/*.conf
source = ~/.config/hypr/custom/*.conf
