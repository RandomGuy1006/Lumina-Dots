# modules/hypr/hyprlock.conf
# Lock screen configuration
# Colors and image path updated by Matugen theme pipeline
source = ~/.config/hypr/hyprlock-colors.conf

general {
  disable_loading_bar = false
  hide_cursor         = true
  grace               = 0
  no_fade_in          = false
  no_fade_out         = false
  ignore_empty_input  = false
  text_trim           = true
}

# ─── Background ───────────────────────────────────────────────────────────────
background {
  monitor    =
  path       = ~/.cache/matugen/wallpaper-cache   # Written by apply-theme.sh (format-agnostic)
  blur_passes  = 3
  blur_size    = 8
  noise        = 0.02
  contrast     = 0.85
  brightness   = 0.6
  vibrancy     = 0.2
  vibrancy_darkness = 0.1
}

# ─── Clock ────────────────────────────────────────────────────────────────────
label {
  monitor    =
  text       = $TIME
  color      = $fg
  font_size  = 86
  font_family = Inter Thin
  position   = 0, 200
  halign     = center
  valign     = center
}

label {
  monitor    =
  text       = cmd[update:60000] date +"%A, %B %d"
  color      = $fg
  font_size  = 22
  font_family = Inter Light
  position   = 0, 110
  halign     = center
  valign     = center
}

# ─── Password input ───────────────────────────────────────────────────────────
input-field {
  monitor    =
  size       = 320, 54
  outline_thickness = 2
  dots_size  = 0.3
  dots_spacing = 0.2
  dots_center = true
  dots_rounding = -1
  outer_color = $accent
  inner_color = rgba(0,0,0,0.4)
  font_color  = $fg
  fade_on_empty = true
  fade_timeout = 1500
  placeholder_text = <span font_desc="Inter 14">Enter password</span>
  hide_input = false
  rounding   = 16
  check_color = $accent
  fail_color  = $danger
  fail_text   = <i>$FAIL <b>($ATTEMPTS)</b></i>
  fail_transition = 300
  capslock_color = $warning
  numlock_color = -1
  bothlock_color = -1
  invert_numlock = false
  swap_font_color = false
  position   = 0, -60
  halign     = center
  valign     = center
}

# ─── User avatar / greeting ───────────────────────────────────────────────────
label {
  monitor    =
  text       = $USER
  color      = $fg
  font_size  = 16
  font_family = Inter Medium
  position   = 0, -10
  halign     = center
  valign     = center
}

shape {
  monitor     =
  size        = 100, 100
  color       = $accent
  rounding    = 50
  border_size = 3
  border_color = $accent_alt
  position    = 0, 50
  halign      = center
  valign      = center
}

image {
  monitor    =
  path       = ~/.face
  size       = 94
  rounding   = 50
  position   = 0, 50
  halign     = center
  valign     = center
}
