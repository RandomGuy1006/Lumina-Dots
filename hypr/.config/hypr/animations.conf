# modules/hypr/animations.conf
# Spring-physics animations — Android/iOS-like fluid motion
# Bezier curve 0.05, 0.9, 0.1, 1.05 = spring overshoot feel

animations {
  enabled = true

  # ─── Custom bezier curves ───────────────────────────────────────────────────
  # Spring-like: slight overshoot (y > 1.0 at peak), then settles
  bezier = spring,       0.05, 0.9, 0.1, 1.05
  # Fast out: quick exit, clean
  bezier = fastOut,      0.36, 0, 0.66, -0.56
  # Ease out quart: smooth deceleration for workspace slides
  bezier = easeOutQuart, 0.25, 1, 0.5, 1
  # Overshot: more dramatic spring for special elements
  bezier = overshot,     0.13, 0.99, 0.29, 1.10
  # Linear for fades
  bezier = linear,       1, 1, 0, 0

  # ─── Window animations ─────────────────────────────────────────────────────
  # Open: slide in from bottom with spring
  animation = windowsIn,  1, 5,  spring,       slide
  # Close: fade out + shrink (fast)
  animation = windowsOut, 1, 4,  default,      popin 85%
  # Move/resize: spring physics
  animation = windowsMove, 1, 4, spring

  # ─── Workspace transitions ─────────────────────────────────────────────────
  # Slide horizontal with smooth deceleration
  animation = workspaces,       1, 6, easeOutQuart, slide
  animation = specialWorkspace, 1, 5, spring,       slidevert

  # ─── Layer animations (bars, launchers, panels) ────────────────────────────
  animation = layers, 1, 4, spring, slide

  # ─── Fade ──────────────────────────────────────────────────────────────────
  animation = fadeIn,      1, 5, spring
  animation = fadeOut,     1, 4, spring
  animation = fadeSwitch,  1, 5, spring
  animation = fadeShadow,  1, 5, spring
  animation = fadeDim,     1, 5, spring
  animation = fadeLayers,  1, 4, spring
  animation = fadeLayersIn,  1, 4, spring
  animation = fadeLayersOut, 1, 4, spring

  # ─── Border ─────────────────────────────────────────────────────────────────
  animation = border,      1, 10, default
  animation = borderangle, 1, 80, linear, loop
}
