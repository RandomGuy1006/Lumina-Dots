# modules/hypr/workspaces.conf
# Workspace definitions and persistence rules

# ─── Default workspaces ───────────────────────────────────────────────────────
# 10 workspaces total; workspace 1 is default on primary monitor
workspace = 1,  default:true, persistent:true
workspace = 2,  persistent:true
workspace = 3,  persistent:true
workspace = 4,  persistent:true
workspace = 5,  persistent:true
workspace = 6,  persistent:true
workspace = 7,  persistent:true
workspace = 8,  persistent:true
workspace = 9,  persistent:true
workspace = 10, persistent:true

# ─── Special workspaces (scratchpads) ─────────────────────────────────────────
# terminal scratchpad
workspace = special:terminal, on-created-empty:ghostty
# btop scratchpad
workspace = special:btop,     on-created-empty:ghostty -e btop
# notes scratchpad
workspace = special:notes,    on-created-empty:ghostty -e nvim ~/Notes/scratch.md
