# fallback/hyprland-minimal.conf
# Emergency minimal Hyprland config — use when the main config is broken.
# Launch with: HYPRLAND_NO_AUTOSTART=1 Hyprland
#              Then source this manually, or copy to ~/.config/hypr/hyprland.conf
#
# Provides: terminal, launcher, basic focus, exit
# Does NOT load: Matugen colors, exec.conf services, session target

monitor = ,preferred,auto,1

$terminal = ghostty
$mod = SUPER

input {
  kb_layout = us
  follow_mouse = 1
  touchpad {
    natural_scroll = true
    tap-to-click = true
  }
}

general {
  gaps_in = 4
  gaps_out = 8
  border_size = 2
  col.active_border = rgba(7dc4ffff)
  col.inactive_border = rgba(444444ff)
  layout = dwindle
}

decoration {
  rounding = 8
  shadow {
    enabled = false
  }
  blur {
    enabled = false
  }
}

animations {
  enabled = false
}

dwindle {
  pseudotile = true
  preserve_split = true
}

# ─── Critical binds only ──────────────────────────────────────────────────────
bind = $mod, Return, exec, $terminal
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod SHIFT, E, exit
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
