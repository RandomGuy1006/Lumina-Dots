$fg = rgba({{colors.on_surface.default.hex_stripped}}ff)
$muted = rgba({{colors.on_surface_variant.default.hex_stripped}}ff)
$surface = rgba({{colors.surface.default.hex_stripped}}ee)
$surface_alt = rgba({{colors.surface_container.default.hex_stripped}}ee)
$surface_glass = rgba({{colors.surface_container_high.default.hex_stripped}}cc)
$border_active_a = rgba({{colors.primary.default.hex_stripped}}ff)
$border_active_b = rgba({{colors.secondary.default.hex_stripped}}ff)
$border_inactive = rgba({{colors.outline.default.hex_stripped}}aa)
$accent = rgba({{colors.primary.default.hex_stripped}}ff)
$accent_alt = rgba({{colors.secondary.default.hex_stripped}}ff)
$danger = rgba({{colors.error.default.hex_stripped}}ff)
$warning = rgba({{colors.tertiary.default.hex_stripped}}ff)
$shadow = rgba({{colors.shadow.default.hex_stripped}}66)

general {
    col.active_border = $border_active_a $border_active_b 45deg
    col.inactive_border = $border_inactive
}

decoration {
    shadow {
        color = $shadow
    }
}

