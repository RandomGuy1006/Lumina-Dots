# LOQ 15IRX9 — Base kernel parameters
# Read by scripts/install/05-hardware.sh via read_manifest()
# GPU-conditional params (nvidia-drm.*) are appended dynamically.

quiet
loglevel=3
rd.udev.log_level=3
vt.global_cursor_default=0
nowatchdog
mem_sleep_default=deep
i915.enable_psr=0
ibt=off
nvme_core.default_ps_max_latency_us=0
acpi_backlight=native
iommu=pt
mitigations=auto
